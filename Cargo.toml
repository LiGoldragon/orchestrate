[package]
name         = "persona-orchestrate"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.89"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/persona-orchestrate"
description  = "Typed orchestration state for Persona agents."
publish      = false

[lib]
name = "persona_orchestrate"
path = "src/lib.rs"

[[bin]]
name = "persona-orchestrate-daemon"
path = "src/main.rs"

[[bin]]
name = "persona-orchestrate"
path = "src/bin/persona-orchestrate.rs"

[dependencies]
sema                        = { git = "https://github.com/LiGoldragon/sema.git" }
sema-engine                 = { git = "https://github.com/LiGoldragon/sema-engine.git" }
signal-persona-orchestrate = { git = "https://github.com/LiGoldragon/signal-persona-orchestrate.git", branch = "main" }
owner-signal-persona-orchestrate = { git = "https://github.com/LiGoldragon/owner-signal-persona-orchestrate.git", branch = "main" }
signal-frame                = { git = "https://github.com/LiGoldragon/signal-frame.git", branch = "main" }
signal-sema                 = { git = "https://github.com/LiGoldragon/signal-sema.git", branch = "main" }
nota-codec                  = { git = "https://github.com/LiGoldragon/nota-codec.git", branch = "main" }
rkyv                        = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
thiserror                   = "2"

[dev-dependencies]
tempfile = "3"

[lints.rust]
unsafe_code = "forbid"
unused = { level = "warn", priority = -1 }
dead_code = "warn"
